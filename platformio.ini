; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = time, esp32_exception_decoder
targets = upload, monitor
extra_scripts =
	post:tools/post_upload_monitor.py
build_flags =
	-D DISPLAY_MODEL_CLASS=GxEPD2_750_GDEY075T7
	-D DISPLAY_PIN_CS=5
	-D DISPLAY_PIN_DC=17
	-D DISPLAY_PIN_RST=16
	-D DISPLAY_PIN_BUSY=4
	-D DISPLAY_PIN_PWR=32
	-D DISPLAY_PIN_SCK=18
	-D DISPLAY_PIN_MISO=19
	-D DISPLAY_PIN_MOSI=23
	-D DISPLAY_SPI_FREQUENCY=4000000
	-D DISPLAY_RESET_DURATION_MS=10
	-D DISPLAY_HAS_BUSY_CALLBACK=false
	; Kompilowana jest tylko JEDNA rodzina fontow (oszczednosc Flash). Do wyboru:
	;   Helvetica (domyslna, wbudowany U8g2 bez offline) | Roboto | Inter | JetBrainsMono | Atkinson
	-D FONT_FAMILY=Helvetica
lib_deps =
	bblanchon/ArduinoJson @ ^7.1.0
	zinggjm/GxEPD2 @ ^1.6.4
	olikraus/U8g2_for_Adafruit_GFX @ ^1.8.0
